name: photograph
version: "0.1.0"
summary: Native photo editor with non-destructive workflows
description: |
  Photograph is a native Rust desktop photo browser and editor for image
  management and color grading. It supports RAW formats (RAF, DNG, NEF, CR2,
  ARW), non-destructive sidecar-based edits, GPU-accelerated preview via
  Vulkan, and batch export to JPG, PNG, or WebP.
base: core24
confinement: strict
grade: devel
license: GPL-2.0-only

plugs:
  gpu-2404:
    interface: content
    target: $SNAP/gpu-2404
    default-provider: mesa-2404

layout:
  /usr/share/X11/XErrorDB:
    symlink: $SNAP/gpu-2404/X11/XErrorDB
  /usr/share/libdrm:
    bind: $SNAP/gpu-2404/libdrm
  /usr/share/drirc.d:
    symlink: $SNAP/gpu-2404/drirc.d

apps:
  photograph:
    command-chain:
      - bin/gpu-2404-wrapper
    command: bin/photograph
    environment:
      XDG_DATA_DIRS: $SNAP/usr/share:$XDG_DATA_DIRS
    plugs:
      - opengl
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - home
      - removable-media
      - hardware-observe

parts:
  photograph:
    plugin: rust
    source: .
    rust-channel: stable
    build-packages:
      - pkg-config
      - libx11-dev
      - libxcb1-dev
      - libxcb-render0-dev
      - libxcb-shape0-dev
      - libxcb-xfixes0-dev
      - libxkbcommon-dev
      - libxkbcommon-x11-dev
      - libwayland-dev
      - wayland-protocols
      - libvulkan-dev
      - libgl-dev
      - libegl-dev
      - libssl-dev
      - libdbus-1-dev
    stage-packages:
      - libx11-6
      - libxcb1
      - libxcb-render0
      - libxcb-shape0
      - libxcb-xfixes0
      - libxkbcommon0
      - libfontconfig1
      - fontconfig-config
      - libssl3t64
      - libdbus-1-3

  gpu-2404:
    after: [photograph]
    source: https://github.com/canonical/gpu-snap.git
    plugin: dump
    override-prime: |
      craftctl default
      ${CRAFT_PART_SRC}/bin/gpu-2404-cleanup mesa-2404
      mkdir -p "${CRAFT_PRIME}/gpu-2404"
    prime:
      - bin/gpu-2404-wrapper
